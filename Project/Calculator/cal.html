<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <link rel="stylesheet" href="cal.css">
</head>
<body>
    <h1 class="header">Calculator</h1>

    <div class="calculator">
        <div class="display">
            <div class="prev-operand"></div>
            <div class="curr-operand">0</div>
        </div>

        <div class="buttons">

            <button class="clear">C</button>
            <button class="delete">&larr;</button>
            <button class="operator">%</button>
            <button class="operator">/</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">*</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">-</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operator">+</button>

            <button>0</button>
            <button>.</button>
            <button class="equal">=</button>

        </div>

    </div>
    
</body>
</html>
