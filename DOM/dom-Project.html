<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Youtube Subscribe Button</p>
    <button onclick="subscribe()" class ="js-sub-btn">Subscribe</button>

    <p>Amazon Shipping Calculator</p>
    <input placeholder="Cost of Order" class="js-cost-input" onkeypress="handleClick(event)">
     
    <button onclick="calculateTotal()" class="js-calculate-btn">Calculate Shipping</button>
    <p class="js-total-cost"></p>

    <script>
        function handleClick(event){
            if(event.key === 'Enter'){ 
                calculateTotal(); 
            }
        }

        function calculateTotal(){
            const inputElement = document.querySelector('.js-cost-input');
            let cost = Number(inputElement.value);
            
            if(cost < 40){
                cost = cost + 10;
            }

            document.querySelector('.js-total-cost').innerHTML = `Total Cost: $${cost}`;
        }

        function subscribe(){
            const buttonElement = document.querySelector('.js-sub-btn');

        if(buttonElement.innerText === 'Subscribe'){
            buttonElement.innerHTML = 'Subscribed';
        }
        else{
            buttonElement.innerHTML = 'Subscribe';
        }
    }
    </script>
</body>
</html>
