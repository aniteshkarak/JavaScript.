<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <button onclick="playgame('Rock');">Rock</button>
    
    <button onclick="playgame('Paper');">Paper</button>

    <button onclick="playgame('Scissors');">Scissors</button>

    <P class="js-result"></P>
    <P class="js-moves"></P>
    <P class="js-score"></P>

    <button onclick="
scores.Wins = 0; scores.loses = 0; scores.ties = 0; localStorage.setItem('scores', JSON.stringify(scores)); alert('Scores reset!');
updateScoreElement();
    ">Reset Scores</button>

    <script>
        const scores = JSON.parse(localStorage.getItem('scores')) || {
            Wins: 0,
            loses: 0,
            ties: 0
        };

        document.querySelector('.js-score')
            .innerHTML= `Wins: ${scores.Wins}, Loses: ${scores.loses}, Ties: ${scores.ties}`;

        function playgame(playerMove) {
            let computerMove = pickComputerMove();

            let result = '';

            if (playerMove === 'Scissors') {
                if (computerMove === 'Rock') {
                    result = 'You lose!';
                }
                else if (computerMove === 'Paper') {
                    result = 'You win!';
                }
                else if (computerMove === 'Scissors') {
                    result = 'It is a tie!';
                }
            }

            if (playerMove === 'Paper') {
                if (computerMove === 'Rock') {
                    result = 'You win!';
                }
                else if (computerMove === 'Paper') {
                    result = 'It is a tie!';
                }
                else if (computerMove === 'Scissors') {
                    result = 'You lose!';
                }
            }

            if (playerMove === 'Rock') {
                if (computerMove === 'Rock') {
                    result = 'It is a tie!';
                }
                else if (computerMove === 'Paper') {
                    result = 'You lose!';
                }
                else if (computerMove === 'Scissors') {
                    result = 'You win!';
                }
            }

            if(result === 'You win!'){
                scores.Wins += 1;
            }
            else if(result === 'You lose!'){
                scores.loses += 1;
            }
            else if(result === 'It is a tie!'){
                scores.ties += 1;
            }

            localStorage.setItem('scores', JSON.stringify(scores));

            updateScoreElement();

            document.querySelector('.js-result').innerHTML = result;
            document.querySelector('.js-moves').innerHTML = `You chose ${playerMove}, computer chose ${computerMove}.`;

            //alert(`Computer chose ${computerMove}. ${result} Wins: ${scores.Wins}, Loses: ${scores.loses}, Ties: ${scores.ties}`);
        }

        function updateScoreElement(){
            document.querySelector('.js-score').innerHTML = `Wins: ${scores.Wins}, Loses: ${scores.loses}, Ties: ${scores.ties}`;
        }

        function pickComputerMove() {
            const randomNumber = Math.random();

            let computerMove = '';
            if (randomNumber >= 0 && randomNumber < 1/3) {
                computerMove = 'Rock';
            }
            else if (randomNumber >= 1/3 && randomNumber < 2/3) {
                computerMove = 'Paper';
            }
            else if (randomNumber >= 2/3 && randomNumber < 1) {
                computerMove = 'Scissors';
            }

            return computerMove;
        }
    </script>
</body>
</html>
