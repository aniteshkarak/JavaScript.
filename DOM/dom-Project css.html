<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container{
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        p{
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }
        .sub-button{
            background-color: black;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 50px;
        }
        .is-subscribed{
            background-color: red;
        }
        .input-field{
            padding: 10px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .calculate-button{
            background-color: green;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 10px;
        }
    </style>

</head>
<body>
    <div class="container">
        <p>Youtube Subscribe Button</p>
        <button onclick="subscribe()" class ="js-sub-btn sub-button">Subscribe</button>

        <p>Amazon Shipping Calculator</p>
        <input placeholder="Cost of Order" class="js-cost-input input-field" onkeypress="handleClick(event)">
        
        <button onclick="calculateTotal()" class="js-calculate-btn calculate-button">Calculate Shipping</button>
        <p class="js-total-cost"></p>
    </div>

    <script>
        function handleClick(event){
            if(event.key === 'Enter'){ 
                calculateTotal(); 
            }
        }

        function calculateTotal(){
            const inputElement = document.querySelector('.js-cost-input');
            let cost = Number(inputElement.value);
            
            if(cost > 0 && cost < 40){
                cost = cost + 10;
            }

            document.querySelector('.js-total-cost').innerHTML = `Total Cost: $${cost}`;
        }

        function subscribe(){
            const buttonElement = document.querySelector('.js-sub-btn');

        if(buttonElement.innerText === 'Subscribe'){
            buttonElement.innerHTML = 'Subscribed';
            buttonElement.classList.add('is-subscribed');
        }
        else{
            buttonElement.innerHTML = 'Subscribe';
            buttonElement.classList.remove('is-subscribed');
        }
    }
    </script>
</body>
</html>
